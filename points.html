<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votage — Points</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/Favicon-VTA.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    
  <header class="topbar">
    <div class="topbar-left">
      <a class="brand" href="index.html">
        <img src="assets/icons/logo-mark.svg" alt="Votage logo" class="brand-mark" />
      </a>
      <button class="primary-action">
        <img src="assets/icons/icon-create.svg" alt="" />
        <span>Start Battle</span>
      </button>
      <nav class="main-nav">
        <a href="results.html" class="nav-link"><img src="assets/icons/icon-results.svg" alt="" /> Results</a>
        <a href="#" class="nav-link js-open-swap"><img src="assets/icons/icon-swap.svg" alt="" /> Swap</a>
        <a href="market.html" class="nav-link"><img src="assets/icons/icon-market.svg" alt="" /> Market</a>
        <a href="points.html" class="nav-link"><img src="assets/icons/icon-points.svg" alt="" /> Points</a>
        <a href="how-it-works.html" class="nav-link"><img src="assets/icons/icon-help.svg" alt="" /> How it works</a>
      </nav>
    </div>
    <div class="topbar-right">
      <button class="wallet-btn js-wallet">Connect Wallet</button>
    </div>
  </header>

    <main class="simple-page profile-grid">
      <section class="card panel-page">
        <div class="user-row">
          <img src="assets/images/avatar-default.jpg" class="avatar" alt="Avatar" />
          <div>
            <h1 class="no-margin">Points</h1>
            <div class="subtle">Edit photo, username and social links here.</div>
          </div>
        </div>

        <div class="form-stack">
          <div class="field">
            <label>Username</label>
            <input value="username" />
          </div>
          <div class="field">
            <label>Wallet</label>
            <input value="0x1ad3...9c72" />
          </div>
          <div class="field">
            <label>Connect X</label>
            <button class="soft-btn left-just"><img src="assets/icons/icon-x.svg" alt="" /> Connect account</button>
          </div>
          <div class="field">
            <label>Upload photo</label>
            <button class="soft-btn left-just">Choose image</button>
          </div>
        </div>
      </section>

      <section class="card panel-page">
        <h2>Your stats</h2>
        <div class="kv-list">
          <div><span>Score</span><strong>12,480</strong></div>
          <div><span>Referrals</span><strong>19</strong></div>
          <div><span>Rewards</span><strong>480 VTG</strong></div>
          <div><span>Win rate</span><strong>68%</strong></div>
          <div><span>Season rank</span><strong>#148</strong></div>
          <div><span>Claimable</span><strong>120 VTG</strong></div>
        </div>
        <button class="primary-wide">Claim rewards</button>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
