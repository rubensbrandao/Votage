<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votage</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

</head>

<body>

<header class="topbar">
  <div class="logo">VOTAGE</div>
  <button id="connectBtn">Connect Wallet</button>
</header>

<section class="hero">
  <h1>The users power the system.</h1>
  <p>Vote → Generate Value → Distribute → Burn</p>
  <button class="cta">Start Battle</button>
</section>

<section class="battles">
  <h2>Active Battles</h2>

  <div class="battle-card">
    <div class="option">BTC</div>
    <div class="vs">VS</div>
    <div class="option">ETH</div>

    <button class="vote">Vote</button>
  </div>

</section>

<section class="stats">
  <div>Total Volume: <span id="volume">0</span></div>
  <div>Total Votes: <span id="votes">0</span></div>
  <div>Burned: <span id="burn">0</span></div>
</section>

<section class="leaderboard">
  <h2>Top Users</h2>
  <div id="leaderboardList"></div>
</section>

<script src="app.js"></script>

</body>
</html>
