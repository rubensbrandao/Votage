<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votage</title>

<link rel="stylesheet" href="css/styles.css">
<script src="js/config.js"></script>
<script defer src="js/app.js"></script>

</head>

<body>

<header class="topbar">
  <div class="logo">VOTAGE</div>
  <button id="connectBtn">Connect</button>
</header>

<section class="hero">
  <h1>The users power the system.</h1>
  <p>Vote → Generate Value → Distribute → Burn</p>
  <button class="cta">Start Battle</button>
</section>

<section class="battles">
  <h2>Active Battles</h2>

  <div class="battle-card">
    <div>BTC</div>
    <div>VS</div>
    <div>ETH</div>
    <button class="vote">Vote</button>
  </div>

</section>

<section class="stats">
  <div>Volume: <span id="volume">0</span></div>
  <div>Votes: <span id="votes">0</span></div>
  <div>Burn: <span id="burn">0</span></div>
</section>

<section class="leaderboard">
  <h2>Leaderboard</h2>
  <div id="leaderboardList"></div>
</section>

</body>
</html>
