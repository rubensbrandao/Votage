<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votage</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg, #0f0f0f, #0a0a0a);
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  border-bottom:1px solid #222;
}

.logo {
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.user {
  display:flex;
  align-items:center;
  gap:10px;
}

.user img {
  width:35px;
  border-radius:50%;
}

/* CATEGORIES */
.categories {
  display:flex;
  gap:10px;
  padding:15px 30px;
}

.category {
  border:1px solid #333;
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}

.category:hover {
  background:#222;
}

/* HOT */
.hot-bar {
  display:flex;
  gap:10px;
  padding:10px 30px;
}

.hot-item {
  background:#1a1a1a;
  padding:10px 15px;
  border-radius:20px;
  font-size:13px;
}

/* MAIN */
.main {
  display:grid;
  grid-template-columns: 1fr 300px;
  gap:20px;
  padding:20px 30px;
}

/* CARD */
.card {
  background:#161616;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.creator {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.creator img {
  width:40px;
  border-radius:50%;
}

.title {
  font-size:18px;
  margin-bottom:5px;
}

.desc {
  font-size:14px;
  color:#aaa;
  margin-bottom:15px;
}

/* OPTIONS */
.images {
  display:flex;
  gap:10px;
}

.option {
  flex:1;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}

.option:hover {
  transform:scale(1.02);
}

.option img {
  width:100%;
  height:150px;
  object-fit:cover;
  filter:brightness(0.8);
}

.option span {
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:15px;
}

.optionA { border:2px solid #3498db; }
.optionB { border:2px solid #f1c40f; }

/* % TEXT */
.percent {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:13px;
}

/* BAR */
.bar {
  margin-top:5px;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  width:65%;
  background:linear-gradient(90deg,#3498db,#6dd5fa);
  transition:0.4s;
}

/* ACTIONS */
.actions {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.left-actions {
  display:flex;
  gap:15px;
}

.action {
  cursor:pointer;
  font-size:14px;
  color:#aaa;
  transition:0.2s;
}

.action:hover {
  color:white;
}

/* SIDEBAR */
.sidebar {
  border-left:1px solid #222;
  padding-left:20px;
}

.section {
  margin-bottom:20px;
}

.section h4 {
  color:#aaa;
}

.item {
  margin-bottom:8px;
}

/* MOBILE */
@media(max-width:900px){
  .main { grid-template-columns:1fr; }
  .sidebar { display:none; }
}
</style>

</head>

<body>

<header>
  <div class="logo">VOTAGE</div>

  <div class="user">
    <span>Hello, user</span>
    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1">
  </div>
</header>

<div class="categories">
  <div class="category">All</div>
  <div class="category">Crypto</div>
  <div class="category">Music</div>
  <div class="category">Games</div>
</div>

<div class="hot-bar">
  <div class="hot-item">🔥 BTC vs ETH</div>
  <div class="hot-item">🔥 Messi vs Ronaldo</div>
</div>

<div class="main">

  <div>

    <div class="card">

      <div class="creator">
        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=2">
        <div>
          <div>@user123</div>
          <small style="color:#aaa;">0x123...89ab</small>
        </div>
      </div>

      <div class="title">Who is better?</div>
      <div class="desc">
        Sonic vs Mario in speed and gameplay... <span style="color:white;">see more</span>
      </div>

      <div class="images">

        <div class="option optionA">
          <img src="https://upload.wikimedia.org/wikipedia/en/5/5f/Sonic_the_Hedgehog.png">
          <span>Sonic</span>
        </div>

        <div class="option optionB">
          <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/MarioNSMBUDeluxe.png">
          <span>Mario</span>
        </div>

      </div>

      <div class="percent">
        <span>65%</span>
        <span>35%</span>
      </div>

      <div class="bar">
        <div class="fill"></div>
      </div>

      <div class="actions">
        <div class="left-actions">
          <div class="action">❤️ 120</div>
          <div class="action">💬 24</div>
        </div>

        <div class="action">🔗 Share</div>
      </div>

    </div>

  </div>

  <div class="sidebar">

    <div class="section">
      <h4>🏆 TOP USERS</h4>
      <div class="item">#1 0x123... 1200 pts</div>
      <div class="item">#2 0x456... 980 pts</div>
    </div>

    <div class="section">
      <h4>🔥 TRENDING</h4>
      <div class="item">BTC vs ETH</div>
      <div class="item">iPhone vs Samsung</div>
    </div>

  </div>

</div>

</body>
</html>
