<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Votage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .btn {
      background: linear-gradient(90deg, #344566, #8b8e95);
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      display: flex;
    }

    /* Sidebar ranking */
    .sidebar {
      width: 300px;
      border-right: 1px solid #222;
      padding: 20px;
    }

    .ranking-item {
      margin-bottom: 10px;
      font-size: 14px;
    }

    /* Feed */
    .feed {
      flex: 1;
      padding: 20px;
    }

    .categories {
      margin-bottom: 20px;
    }

    .category {
      margin-right: 10px;
      cursor: pointer;
      color: #aaa;
    }

    .category.active {
      color: white;
      font-weight: bold;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .poll-options {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .option {
      flex: 1;
      background: #222;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .option:hover {
      background: #333;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">VOTAGE</div>
  <button class="btn">Connect Wallet</button>
</header>

<div class="container">

  <!-- Ranking -->
  <div class="sidebar">
    <h3>Top Players</h3>
    <div class="ranking-item">#1 Wallet 0x123... - 1200 pts</div>
    <div class="ranking-item">#2 Wallet 0x456... - 980 pts</div>
    <div class="ranking-item">#3 Wallet 0x789... - 870 pts</div>
  </div>

  <!-- Feed -->
  <div class="feed">

    <!-- Categories -->
    <div class="categories">
      <span class="category active">All</span>
      <span class="category">Crypto</span>
      <span class="category">Music</span>
      <span class="category">Games</span>
      <span class="category">Politics</span>
    </div>

    <!-- Poll -->
    <div class="card">
      <h2>Who is better?</h2>
      <p>Sonic vs Mario</p>

      <div class="poll-options">
        <div class="option">Sonic</div>
        <div class="option">Mario</div>
      </div>
    </div>

    <!-- Poll -->
    <div class="card">
      <h2>Best investment?</h2>
      <p>BTC vs ETH</p>

      <div class="poll-options">
        <div class="option">BTC</div>
        <div class="option">ETH</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
